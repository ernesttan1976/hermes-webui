<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hermes Service Control</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; margin: 20px; }
    .status { margin-bottom: 10px; }
    button { margin-right: 8px; padding: 6px 12px; }
    pre { background: #111; color: #eee; padding: 10px; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>Hermes Service Control</h1>
  <div class="status">
    Status: <span id="status">loading...</span>
    <span id="pid"></span>
  </div>
  <div>
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
    <button id="refreshBtn">Refresh</button>
  </div>
  <h2>Logs</h2>
  <pre id="logs"></pre>

  <script>
    const baseUrl = "http://127.0.0.1:8788";

    async function fetchStatus() {
      try {
        const res = await fetch(baseUrl + "/status");
        const data = await res.json();
        document.getElementById("status").textContent = data.running ? "running" : "stopped";
        document.getElementById("pid").textContent = data.pid ? `(pid ${data.pid})` : "";
      } catch (e) {
        document.getElementById("status").textContent = "control server unreachable";
        document.getElementById("pid").textContent = "";
      }
    }

    async function fetchLogs() {
      try {
        const res = await fetch(baseUrl + "/logs");
        const text = await res.text();
        document.getElementById("logs").textContent = text || "(no logs yet)";
      } catch (e) {
        document.getElementById("logs").textContent = "Unable to load logs";
      }
    }

    async function doStart() {
      await fetch(baseUrl + "/start", { method: "POST" });
      await fetchStatus();
      await fetchLogs();
    }

    async function doStop() {
      await fetch(baseUrl + "/stop", { method: "POST" });
      await fetchStatus();
      await fetchLogs();
    }

    document.getElementById("startBtn").onclick = doStart;
    document.getElementById("stopBtn").onclick = doStop;
    document.getElementById("refreshBtn").onclick = () => {
      fetchStatus();
      fetchLogs();
    };

    // Initial load and periodic refresh
    fetchStatus();
    fetchLogs();
    setInterval(() => {
      fetchStatus();
      fetchLogs();
    }, 5000);
  </script>
</body>
</html>
